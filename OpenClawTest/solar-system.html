<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交互式 3D 太阳系探索器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
            color: #fff;
            font-size: 24px;
        }
        
        #loading.hidden {
            display: none;
        }
        
        #loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #333;
            border-top: 5px solid #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        #controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        
        #controls button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        #controls button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        #controls button:active {
            transform: translateY(0);
        }
        
        #info-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #4CAF50;
            border-radius: 10px;
            padding: 20px;
            color: white;
            max-width: 300px;
            z-index: 100;
            display: none;
            backdrop-filter: blur(10px);
            animation: slideIn 0.3s ease;
        }
        
        #info-panel.show {
            display: block;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        #info-panel h3 {
            color: #4CAF50;
            margin-bottom: 15px;
            font-size: 20px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        
        #info-panel p {
            margin: 10px 0;
            line-height: 1.6;
            font-size: 14px;
        }
        
        #info-panel .label {
            color: #888;
            font-size: 12px;
        }
        
        #info-panel .value {
            color: #fff;
            font-size: 15px;
            font-weight: 600;
        }
        
        #title {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 28px;
            font-weight: bold;
            z-index: 100;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        #legend {
            position: fixed;
            top: 80px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-size: 12px;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        #legend h4 {
            margin-bottom: 10px;
            color: #4CAF50;
        }
        
        #legend p {
            margin: 5px 0;
        }
        
        #legend .key {
            color: #888;
        }
        
        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            color: #888;
            font-size: 20px;
            cursor: pointer;
            width: 25px;
            height: 25px;
            line-height: 25px;
            text-align: center;
            border-radius: 50%;
            transition: all 0.3s ease;
        }
        
        .close-btn:hover {
            background: #333;
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div id="loading-spinner"></div>
        <div>正在构建 3D 太阳系场景...</div>
    </div>
    
    <div id="title">🌌 交互式 3D 太阳系探索器</div>
    
    <div id="legend">
        <h4>📖 交互提示</h4>
        <p><span class="key">🖱️ 左键拖拽</span> 旋转观察视角</p>
        <p><span class="key">🔄 鼠标滚轮</span> 缩放远近</p>
        <p><span class="key">➡️ 右键拖拽</span> 平移场景</p>
        <p><span class="key">👆 点击行星</span> 打开信息卡片</p>
    </div>
    
    <div id="canvas-container"></div>
    
    <div id="controls">
        <button id="pause-btn">⏸️ 暂停动画</button>
        <button id="orbit-btn">👁️ 隐藏轨道</button>
        <button id="reset-btn">🎯 恢复默认视角</button>
    </div>
    
    <div id="info-panel">
        <button class="close-btn" onclick="closeInfoPanel()">×</button>
        <h3 id="planet-name">行星名称</h3>
        <p><span class="label">直径：</span><span class="value" id="planet-diameter">-</span></p>
        <p><span class="label">公转周期：</span><span class="value" id="planet-orbit">-</span></p>
        <p><span class="label">与太阳距离：</span><span class="value" id="planet-distance">-</span></p>
        <p><span class="label">自转周期：</span><span class="value" id="planet-rotation">-</span></p>
        <p><span class="label">说明：</span><span class="value" id="planet-note">点击空白处可关闭卡片</span></p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script>
        // =============================================
        // 全局变量定义
        // =============================================
        let scene, camera, renderer, controls;
        let planets = [];
        let orbits = [];
        let sun;
        let animationId;
        let isPaused = false;
        let showOrbits = true;
        let raycaster, mouse;
        let selectedPlanet = null;
        
        // 太阳系数据（真实比例缩放）
        // 大小缩放系数：1 = 地球大小
        // 距离缩放系数：1 = 地球到太阳的距离（天文单位AU）的简化版
        const SOLAR_SYSTEM_DATA = [
            {
                name: "水星",
                diameter: "4,879 km",
                size: 0.38,
                distance: 10,
                orbitPeriod: 88, // 地球日
                rotationPeriod: "58.6 地球日",
                texture: "https://upload.wikimedia.org/wikipedia/commons/3/30/Mercury_in_color_-_Prockter07_centered.jpg",
                color: 0x8c7853,
                isGas: false
            },
            {
                name: "金星",
                diameter: "12,104 km",
                size: 0.95,
                distance: 15,
                orbitPeriod: 225,
                rotationPeriod: "243 地球日",
                texture: "https://upload.wikimedia.org/wikipedia/commons/e/e5/Venus-real_color.jpg",
                color: 0xffc649,
                isGas: false
            },
            {
                name: "地球",
                diameter: "12,742 km",
                size: 1,
                distance: 20,
                orbitPeriod: 365,
                rotationPeriod: "1 地球日",
                texture: "https://upload.wikimedia.org/wikipedia/commons/c/c3/Solarsystemscope_texture_2k_earth_daymap.jpg",
                color: 0x6b93d6,
                isGas: false
            },
            {
                name: "火星",
                diameter: "6,779 km",
                size: 0.53,
                distance: 25,
                orbitPeriod: 687,
                rotationPeriod: "1.03 地球日",
                texture: "https://upload.wikimedia.org/wikipedia/commons/0/02/OSIRIS_Mars_true_color.jpg",
                color: 0xc1440e,
                isGas: false
            },
            {
                name: "木星",
                diameter: "139,820 km",
                size: 3.5, // 缩小以保持可视化效果
                distance: 35,
                orbitPeriod: 4333,
                rotationPeriod: "9.9 小时",
                texture: "https://upload.wikimedia.org/wikipedia/commons/e/e2/Jupiter.jpg",
                color: 0xd8ca9d,
                isGas: true
            },
            {
                name: "土星",
                diameter: "116,460 km",
                size: 2.9,
                distance: 45,
                orbitPeriod: 10759,
                rotationPeriod: "10.7 小时",
                texture: "https://upload.wikimedia.org/wikipedia/commons/c/c7/Saturn_during_Equinox.jpg",
                color: 0xead6b8,
                isGas: true,
                hasRings: true
            },
            {
                name: "天王星",
                diameter: "50,724 km",
                size: 1.8,
                distance: 55,
                orbitPeriod: 30687,
                rotationPeriod: "17.2 小时",
                texture: "https://upload.wikimedia.org/wikipedia/commons/3/3d/Uranus2.jpg",
                color: 0xd1e7e7,
                isGas: true
            },
            {
                name: "海王星",
                diameter: "49,244 km",
                size: 1.7,
                distance: 65,
                orbitPeriod: 60190,
                rotationPeriod: "16.1 小时",
                texture: "https://upload.wikimedia.org/wikipedia/commons/5/56/Neptune_Full.jpg",
                color: 0x5b5ddf,
                isGas: true
            }
        ];

        // =============================================
        // 初始化场景
        // =============================================
        function initScene() {
            // 创建场景
            scene = new THREE.Scene();
            
            // 创建相机（透视投影）
            camera = new THREE.PerspectiveCamera(
                60, // 视野角度
                window.innerWidth / window.innerHeight, // 宽高比
                0.1, // 近剪裁面
                2000 // 远剪裁面
            );
            camera.position.set(0, 40, 80);
            
            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ 
                antialias: true, // 开启抗锯齿
                alpha: true // 支持透明背景
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true; // 启用阴影
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            // 添加轨道控制器
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; // 启用阻尼效果
            controls.dampingFactor = 0.05;
            controls.minDistance = 20;
            controls.maxDistance = 200;
            
            // 初始化射线检测（用于点击交互）
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();
            
            // 创建星空背景
            createStarfield();
            
            // 添加光源
            addLights();
            
            // 创建太阳
            createSun();
            
            // 创建行星
            createPlanets();
            
            // 绑定事件监听器
            bindEvents();
        }

        // =============================================
        // 创建星空背景
        // =============================================
        function createStarfield() {
            const starGeometry = new THREE.BufferGeometry();
            const starCount = 10000;
            const positions = new Float32Array(starCount * 3);
            const colors = new Float32Array(starCount * 3);
            
            for (let i = 0; i < starCount * 3; i += 3) {
                // 随机分布星空
                positions[i] = (Math.random() - 0.5) * 2000;
                positions[i + 1] = (Math.random() - 0.5) * 2000;
                positions[i + 2] = (Math.random() - 0.5) * 2000;
                
                // 随机星星颜色（偏蓝、白、黄）
                const colorChoice = Math.random();
                if (colorChoice < 0.6) {
                    colors[i] = 1;     // R
                    colors[i + 1] = 1; // G
                    colors[i + 2] = 1; // B
                } else if (colorChoice < 0.8) {
                    colors[i] = 0.8;   // R
                    colors[i + 1] = 0.8; // G
                    colors[i + 2] = 1; // B
                } else {
                    colors[i] = 1;     // R
                    colors[i + 1] = 0.95; // G
                    colors[i + 2] = 0.8; // B
                }
            }
            
            starGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            starGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            
            const starMaterial = new THREE.PointsMaterial({
                size: 0.7,
                vertexColors: true,
                transparent: true,
                opacity: 0.8
            });
            
            const stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);
        }

        // =============================================
        // 添加光源系统
        // =============================================
        function addLights() {
            // 环境光（提供基础照明）
            const ambientLight = new THREE.AmbientLight(0x333333, 0.4);
            scene.add(ambientLight);
            
            // 点光源（模拟太阳光，位于太阳中心）
            const sunLight = new THREE.PointLight(0xffffff, 2, 300);
            sunLight.position.set(0, 0, 0);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 2048;
            sunLight.shadow.mapSize.height = 2048;
            scene.add(sunLight);
        }

        // =============================================
        // 创建太阳
        // =============================================
        function createSun() {
            const sunGeometry = new THREE.SphereGeometry(5, 64, 64);
            
            // 加载太阳纹理或使用默认材质
            const textureLoader = new THREE.TextureLoader();
            const sunTexture = textureLoader.load(
                'https://upload.wikimedia.org/wikipedia/commons/9/99/Map_of_the_full_sun.jpg',
                undefined,
                undefined,
                (error) => {
                    console.warn('太阳纹理加载失败，已自动回退到默认材质');
                }
            );
            
            const sunMaterial = new THREE.MeshBasicMaterial({
                map: sunTexture,
                color: 0xffff00
            });
            
            sun = new THREE.Mesh(sunGeometry, sunMaterial);
            
            // 添加太阳光晕效果
            const glowGeometry = new THREE.SphereGeometry(5.5, 32, 32);
            const glowMaterial = new THREE.MeshBasicMaterial({
                color: 0xffaa00,
                transparent: true,
                opacity: 0.3,
                side: THREE.BackSide
            });
            const sunGlow = new THREE.Mesh(glowGeometry, glowMaterial);
            sun.add(sunGlow);
            
            scene.add(sun);
        }

        // =============================================
        // 创建行星系统
        // =============================================
        function createPlanets() {
            const textureLoader = new THREE.TextureLoader();
            
            SOLAR_SYSTEM_DATA.forEach((planetData, index) => {
                // 创建行星组（包含行星本体和可能的环）
                const planetGroup = new THREE.Group();
                
                // 创建行星几何体
                const planetGeometry = new THREE.SphereGeometry(planetData.size, 64, 64);
                
                // 创建行星材质
                let planetMaterial;
                
                // 尝试加载纹理，失败则使用默认颜色
                const texture = textureLoader.load(
                    planetData.texture,
                    undefined,
                    undefined,
                    (error) => {
                        console.warn(`${planetData.name} 纹理加载失败，已自动回退到默认颜色材质`);
                    }
                );
                
                planetMaterial = new THREE.MeshStandardMaterial({
                    map: texture,
                    color: planetData.color,
                    roughness: 0.8,
                    metalness: 0.2
                });
                
                // 创建行星网格
                const planetMesh = new THREE.Mesh(planetGeometry, planetMaterial);
                planetMesh.castShadow = true;
                planetMesh.receiveShadow = true;
                planetMesh.userData = { 
                    name: planetData.name,
                    diameter: planetData.diameter,
                    orbitPeriod: planetData.orbitPeriod,
                    rotationPeriod: planetData.rotationPeriod,
                    distance: planetData.distance
                };
                planetGroup.add(planetMesh);
                
                // 为气态行星添加大气光晕
                if (planetData.isGas) {
                    const atmosphereGeometry = new THREE.SphereGeometry(planetData.size * 1.05, 32, 32);
                    const atmosphereMaterial = new THREE.MeshBasicMaterial({
                        color: planetData.color,
                        transparent: true,
                        opacity: 0.15,
                        side: THREE.BackSide
                    });
                    const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
                    planetGroup.add(atmosphere);
                }
                
                // 为土星添加环
                if (planetData.hasRings) {
                    const ringGeometry = new THREE.RingGeometry(
                        planetData.size * 1.4, 
                        planetData.size * 2.2, 
                        64
                    );
                    const ringMaterial = new THREE.MeshBasicMaterial({
                        color: 0xc9b896,
                        side: THREE.DoubleSide,
                        transparent: true,
                        opacity: 0.7
                    });
                    const ring = new THREE.Mesh(ringGeometry, ringMaterial);
                    ring.rotation.x = Math.PI / 2;
                    ring.rotation.y = Math.PI / 8;
                    planetGroup.add(ring);
                }
                
                // 计算初始位置
                const angle = (index / SOLAR_SYSTEM_DATA.length) * Math.PI * 2;
                planetGroup.position.x = Math.cos(angle) * planetData.distance;
                planetGroup.position.z = Math.sin(angle) * planetData.distance;
                
                // 存储行星数据以便动画使用
                planetGroup.userData = {
                    distance: planetData.distance,
                    orbitSpeed: (365 / planetData.orbitPeriod) * 0.01, // 公转速度
                    rotationSpeed: 0.01, // 自转速度
                    angle: angle,
                    name: planetData.name
                };
                
                scene.add(planetGroup);
                planets.push(planetGroup);
                
                // 创建轨道线
                createOrbit(planetData.distance);
            });
        }

        // =============================================
        // 创建行星轨道
        // =============================================
        function createOrbit(radius) {
            const orbitGeometry = new THREE.RingGeometry(radius - 0.1, radius + 0.1, 128);
            const orbitMaterial = new THREE.MeshBasicMaterial({
                color: 0x444444,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.5
            });
            
            const orbit = new THREE.Mesh(orbitGeometry, orbitMaterial);
            orbit.rotation.x = Math.PI / 2;
            
            scene.add(orbit);
            orbits.push(orbit);
        }

        // =============================================
        // 行星公转和自转动画
        // =============================================
        function animatePlanets() {
            if (isPaused) return;
            
            planets.forEach(planet => {
                const data = planet.userData;
                
                // 更新公转角度
                // 公转速度基于实际轨道周期比例
                data.angle += data.orbitSpeed;
                
                // 计算新位置（使用三角函数在XZ平面做圆周运动）
                planet.position.x = Math.cos(data.angle) * data.distance;
                planet.position.z = Math.sin(data.angle) * data.distance;
                
                // 行星自转（绕自身Y轴旋转）
                planet.rotation.y += data.rotationSpeed;
            });
            
            // 太阳自转
            if (sun) {
                sun.rotation.y += 0.002;
            }
        }

        // =============================================
        // 动画主循环
        // =============================================
        function animate() {
            animationId = requestAnimationFrame(animate);
            
            // 执行行星运动动画
            animatePlanets();
            
            // 更新轨道控制器
            controls.update();
            
            // 渲染场景
            renderer.render(scene, camera);
        }

        // =============================================
        // 绑定事件监听器
        // =============================================
        function bindEvents() {
            // 窗口大小改变事件
            window.addEventListener('resize', onWindowResize, false);
            
            // 鼠标点击事件（用于选择行星）
            renderer.domElement.addEventListener('click', onMouseClick, false);
            
            // 控制按钮事件
            document.getElementById('pause-btn').addEventListener('click', togglePause);
            document.getElementById('orbit-btn').addEventListener('click', toggleOrbits);
            document.getElementById('reset-btn').addEventListener('click', resetCamera);
        }

        // =============================================
        // 窗口大小改变处理
        // =============================================
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // =============================================
        // 鼠标点击处理（射线检测）
        // =============================================
        function onMouseClick(event) {
            // 计算鼠标在标准化设备坐标（NDC）中的位置
            // NDC范围：x: -1到1，y: -1到1
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            // 更新射线
            raycaster.setFromCamera(mouse, camera);
            
            // 检测射线与行星的交叉
            const planetMeshes = planets.map(p => p.children[0]);
            const intersects = raycaster.intersectObjects(planetMeshes);
            
            if (intersects.length > 0) {
                // 获取被点击的行星数据
                const selectedPlanetMesh = intersects[0].object;
                const planetData = selectedPlanetMesh.userData;
                
                // 显示行星信息面板
                showPlanetInfo(planetData);
                
                // 高亮选中的行星
                highlightPlanet(selectedPlanetMesh);
            } else {
                // 点击空白处关闭信息面板
                closeInfoPanel();
            }
        }

        // =============================================
        // 显示行星信息面板
        // =============================================
        function showPlanetInfo(planetData) {
            document.getElementById('planet-name').textContent = planetData.name;
            document.getElementById('planet-diameter').textContent = planetData.diameter;
            document.getElementById('planet-orbit').textContent = `${planetData.orbitPeriod} 地球日`;
            document.getElementById('planet-distance').textContent = `${planetData.distance} AU (简化)`;
            document.getElementById('planet-rotation').textContent = planetData.rotationPeriod;
            document.getElementById('planet-note').textContent = '点击空白处可关闭信息卡片';
            
            document.getElementById('info-panel').classList.add('show');
        }

        // =============================================
        // 关闭信息面板
        // =============================================
        function closeInfoPanel() {
            document.getElementById('info-panel').classList.remove('show');
            
            // 移除之前的高亮效果
            if (selectedPlanet) {
                selectedPlanet.material.emissive.setHex(0x000000);
                selectedPlanet = null;
            }
        }

        // =============================================
        // 高亮选中的行星
        // =============================================
        function highlightPlanet(planetMesh) {
            // 恢复之前选中行星的原始颜色
            if (selectedPlanet) {
                selectedPlanet.material.emissive.setHex(0x000000);
            }
            
            // 高亮当前选中的行星
            selectedPlanet = planetMesh;
            planetMesh.material.emissive.setHex(0x333333);
        }

        // =============================================
        // 暂停/继续公转
        // =============================================
        function togglePause() {
            isPaused = !isPaused;
            const btn = document.getElementById('pause-btn');
            btn.textContent = isPaused ? '▶️ 继续动画' : '⏸️ 暂停动画';
        }

        // =============================================
        // 显示/隐藏轨道
        // =============================================
        function toggleOrbits() {
            showOrbits = !showOrbits;
            orbits.forEach(orbit => {
                orbit.visible = showOrbits;
            });
            
            const btn = document.getElementById('orbit-btn');
            btn.textContent = showOrbits ? '👁️ 隐藏轨道' : '👁️ 显示轨道';
        }

        // =============================================
        // 重置相机视角
        // =============================================
        function resetCamera() {
            camera.position.set(0, 40, 80);
            camera.lookAt(0, 0, 0);
            controls.target.set(0, 0, 0);
            controls.update();
        }

        // =============================================
        // 页面加载完成处理
        // =============================================
        function onLoadComplete() {
            const loadingElement = document.getElementById('loading');
            loadingElement.classList.add('hidden');
            
            // 启动动画循环
            animate();
        }

        // =============================================
        // 主函数
        // =============================================
        function main() {
            try {
                initScene();
                
                // 模拟加载延迟，确保所有资源加载完成
                setTimeout(onLoadComplete, 1000);
                
            } catch (error) {
                console.error('初始化失败:', error);
                const loadingElement = document.getElementById('loading');
                loadingElement.innerHTML = `
                    <div style="color: #ff4444; font-size: 28px; margin-bottom: 12px;">⚠️ 场景初始化失败</div>
                    <div style="color: #ddd; font-size: 15px; line-height: 1.7; text-align: center; max-width: 420px;">
                        请刷新页面后重试。<br>
                        如果仍然失败，建议通过本地静态服务器打开页面，而不是直接双击 HTML 文件。
                    </div>
                `;
            }
        }

        // 启动应用
        window.addEventListener('load', main);
    </script>
</body>
</html>
